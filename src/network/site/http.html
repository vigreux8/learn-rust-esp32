<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>ESP32 - Contrôle Servomoteurs (HTTP)</title>
  <link rel="stylesheet" href="/style.css" />
</head>
<body>
  <h1>Contrôle Temps Réel</h1>
  <nav class="mode-nav" aria-label="Modes de contrôle">
    <a class="mode-button" href="/">WebSocketServo</a>
    <a class="mode-button active" href="/http">HttpServo</a>
  </nav>

  <main class="motors-grid">
    <section class="motor-card">
      <div class="motor-header">
        <h2>Moteur Bras</h2>
        <button type="button" class="stop-button" data-target="bras">STOP</button>
      </div>
      <input
        id="slider-bras"
        class="speed-slider"
        data-target="bras"
        type="range"
        min="-100"
        max="100"
        step="1"
        value="0"
      />
    </section>

    <section class="motor-card">
      <div class="motor-header">
        <h2>Moteur Pince</h2>
        <button type="button" class="stop-button" data-target="pince">STOP</button>
      </div>
      <input
        id="slider-pince"
        class="speed-slider"
        data-target="pince"
        type="range"
        min="-100"
        max="100"
        step="1"
        value="0"
      />
    </section>
  </main>

  <p id="transport-status" class="ws-status">Canal HTTP prêt.</p>

  <script type="module" src="/script/http.js"></script>
</body>
</html>
